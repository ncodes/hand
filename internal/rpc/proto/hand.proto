syntax = "proto3";

package hand.v1;

option go_package = "github.com/wandxy/hand/internal/rpc/proto;handpb";

service HandService {
  rpc Chat(ChatRequest) returns (ChatResponse);
}

message ChatRequest {
  string message = 1;
  string instruct = 2;
}

message ChatResponse {
  string message = 1;
}
