syntax = "proto3";

package morph.v1;

option go_package = "github.com/wandxy/morph/internal/rpc/proto;morphpb";

import "google/protobuf/timestamp.proto";

service MorphService {
  rpc Respond(RespondRequest) returns (stream RespondEvent);
}

service SessionService {
  rpc Create(CreateSessionRequest) returns (CreateSessionResponse);
  rpc List(ListSessionsRequest) returns (ListSessionsResponse);
  rpc Use(UseSessionRequest) returns (UseSessionResponse);
  rpc Archive(ArchiveSessionRequest) returns (ArchiveSessionResponse);
  rpc Unarchive(UnarchiveSessionRequest) returns (UnarchiveSessionResponse);
  rpc Rename(RenameSessionRequest) returns (RenameSessionResponse);
  rpc Current(CurrentSessionRequest) returns (CurrentSessionResponse);
  rpc Compact(CompactSessionRequest) returns (CompactSessionResponse);
  rpc Repair(RepairSessionRequest) returns (RepairSessionResponse);
  rpc Status(GetSessionStatusRequest) returns (GetSessionStatusResponse);
  rpc Timeline(GetSessionTimelineRequest) returns (GetSessionTimelineResponse);
}

service ModelService {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc SelectModel(SelectModelRequest) returns (SelectModelResponse);
  rpc SetProviderAPIKey(SetProviderAPIKeyRequest) returns (SetProviderAPIKeyResponse);
}

service GatewayService {
  rpc GatewayStatus(GetGatewayStatusRequest) returns (GetGatewayStatusResponse);
  rpc Start(StartGatewayRequest) returns (StartGatewayResponse);
  rpc Stop(StopGatewayRequest) returns (StopGatewayResponse);
  rpc Restart(RestartGatewayRequest) returns (RestartGatewayResponse);
  rpc ListPairings(ListGatewayPairingsRequest) returns (ListGatewayPairingsResponse);
  rpc ApprovePairing(ApproveGatewayPairingRequest) returns (ApproveGatewayPairingResponse);
  rpc RevokePairing(RevokeGatewayPairingRequest) returns (RevokeGatewayPairingResponse);
  rpc ClearPendingPairings(ClearPendingGatewayPairingsRequest) returns (ClearPendingGatewayPairingsResponse);
}

message RespondRequest {
  string message = 1;
  string instruct = 2;
  string id = 3;
  optional bool stream = 4;
}

message RespondEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TEXT_DELTA = 1;
    DONE = 2;
    ERROR = 3;
    TRACE_EVENT = 4;
  }

  enum Channel {
    CHANNEL_UNSPECIFIED = 0;
    ASSISTANT = 1;
    REASONING = 2;
  }

  Type type = 1;
  string text = 2;
  string error = 3;
  Channel channel = 4;
  string trace_type = 5;
  string trace_payload_json = 6;
  // Present for TRACE_EVENT, ERROR, and DONE. TEXT_DELTA consumers should use local receive time.
  google.protobuf.Timestamp timestamp = 7;
  string trace_session_id = 8;
}

message SessionSummary {
  string id = 1;
  int64 updated_at_unix = 2;
  int32 message_count = 3;
  string title = 4;
  string title_source = 5;
}

message CreateSessionRequest {
  string id = 1;
  optional bool auto_switch = 2;
}

message CreateSessionResponse {
  SessionSummary session = 1;
}

message ListSessionsRequest {
  optional bool archived = 1;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message UseSessionRequest {
  string id = 1;
}

message UseSessionResponse {
  string id = 1;
}

message ArchiveSessionRequest {
  string id = 1;
}

message ArchiveSessionResponse {
  string id = 1;
}

message UnarchiveSessionRequest {
  string id = 1;
}

message UnarchiveSessionResponse {
  SessionSummary session = 1;
}

message RenameSessionRequest {
  string id = 1;
  string title = 2;
}

message RenameSessionResponse {
  SessionSummary session = 1;
}

message CurrentSessionRequest {}

message CurrentSessionResponse {
  string id = 1;
  string title = 2;
  string title_source = 3;
}

message CompactSessionRequest {
  string id = 1;
}

message CompactSessionResponse {
  string id = 1;
  int32 source_end_offset = 2;
  int32 source_message_count = 3;
  google.protobuf.Timestamp updated_at = 4;
  int32 current_context_length = 5;
  int32 total_context_length = 6;
}

message RepairSessionRequest {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    VECTOR = 1;
  }

  Type type = 1;
  VectorRepairOption vector = 2;
}

message RepairSessionResponse {
  RepairSessionRequest.Type type = 1;
  VectorRepairResponse vector = 2;
}

message VectorRepairOption {
  string id = 1;
  bool full = 2;
}

message VectorRepairResponse {
  int32 sessions_scanned = 1;
  int32 messages_scanned = 2;
  int32 rows_scanned = 3;
  int32 missing_rows = 4;
  int32 stale_rows = 5;
  int32 unchanged_rows = 6;
  int32 rebuilt_rows = 7;
  int32 deleted_sources = 8;
  int32 batches = 9;
}

message GetSessionStatusRequestContext {
  string id = 1;
}

message GetSessionStatusRequest {
  GetSessionStatusRequestContext context = 1;
}

message GetSessionStatusResponse {
  string id = 1;
  Context context = 2;
  int32 size = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  string compaction_status = 6;

  message Context {
    int32 offset = 1;
    int32 length = 2;
    int32 used = 3;
    int32 remaining = 4;
    double used_pct = 5;
    double remaining_pct = 6;
  }
}

message GetSessionTimelineRequest {
  string id = 1;
  int32 message_offset = 2;
  int32 message_limit = 3;
  int32 trace_offset = 4;
  int32 trace_limit = 5;
}

message SessionTimelineToolCall {
  string id = 1;
  string name = 2;
  string input = 3;
}

message SessionTimelineMessage {
  int32 offset = 1;
  uint64 id = 2;
  string role = 3;
  string name = 4;
  string tool_call_id = 5;
  string content = 6;
  google.protobuf.Timestamp created_at = 7;
  repeated SessionTimelineToolCall tool_calls = 8;
}

message SessionTimelineTraceEvent {
  uint64 id = 1;
  int32 sequence = 2;
  string type = 3;
  google.protobuf.Timestamp timestamp = 4;
  string payload_json = 5;
}

message GetSessionTimelineResponse {
  string id = 1;
  repeated SessionTimelineMessage messages = 2;
  repeated SessionTimelineTraceEvent trace_events = 3;
  bool messages_has_more = 4;
  bool traces_has_more = 5;
  bool traces_truncated_before = 6;
  int32 first_trace_sequence = 7;
  int32 last_trace_sequence = 8;
  string title = 9;
  string title_source = 10;
}

message ListProvidersRequest {}

message ProviderOption {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 model_count = 4;
  bool supports_api_key = 5;
  bool supports_oauth = 6;
  string auth_type = 7;
  bool current = 8;
}

message ListProvidersResponse {
  repeated ProviderOption providers = 1;
}

message ListModelsRequest {
  string provider = 1;
}

message ModelOption {
  string id = 1;
  string name = 2;
  string provider = 3;
  string api = 4;
  int32 context_window = 5;
  int32 max_tokens = 6;
  repeated string input = 7;
  bool reasoning = 8;
  bool supports_oauth = 9;
  bool current = 10;
}

message ListModelsResponse {
  string provider = 1;
  string auth_type = 2;
  repeated ModelOption models = 3;
}

message SelectModelRequest {
  string id = 1;
  string provider = 2;
}

message SelectModelResponse {
  ModelOption model = 1;
}

message SetProviderAPIKeyRequest {
  string provider = 1;
  string api_key = 2;
}

message SetProviderAPIKeyResponse {
  string provider = 1;
}

message GatewayStatus {
  string state = 1;
  string address = 2;
  int32 port = 3;
  string slack_mode = 4;
  string telegram_mode = 5;
  string last_error = 6;
}

message GetGatewayStatusRequest {}

message GetGatewayStatusResponse {
  GatewayStatus status = 1;
}

message StartGatewayRequest {}

message StartGatewayResponse {
  GatewayStatus status = 1;
}

message StopGatewayRequest {}

message StopGatewayResponse {
  GatewayStatus status = 1;
}

message RestartGatewayRequest {}

message RestartGatewayResponse {
  GatewayStatus status = 1;
}

message GatewayPairingRequest {
  string source = 1;
  string sender_id = 2;
  string display_name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message GatewayPairedSender {
  string source = 1;
  string sender_id = 2;
  string display_name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListGatewayPairingsRequest {
  string source = 1;
}

message ListGatewayPairingsResponse {
  repeated GatewayPairingRequest pending = 1;
  repeated GatewayPairedSender approved = 2;
}

message ApproveGatewayPairingRequest {
  string source = 1;
  string code = 2;
}

message ApproveGatewayPairingResponse {
  bool approved = 1;
  GatewayPairedSender sender = 2;
}

message RevokeGatewayPairingRequest {
  string source = 1;
  string sender_id = 2;
}

message RevokeGatewayPairingResponse {}

message ClearPendingGatewayPairingsRequest {
  string source = 1;
}

message ClearPendingGatewayPairingsResponse {}
