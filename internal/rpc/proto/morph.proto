syntax = "proto3";

package morph.v1;

option go_package = "github.com/wandxy/morph/internal/rpc/proto;morphpb";

import "google/protobuf/timestamp.proto";

service MorphService {
  rpc Respond(RespondRequest) returns (stream RespondEvent);
}

service SessionService {
  rpc Create(CreateSessionRequest) returns (CreateSessionResponse);
  rpc List(ListSessionsRequest) returns (ListSessionsResponse);
  rpc Use(UseSessionRequest) returns (UseSessionResponse);
  rpc Archive(ArchiveSessionRequest) returns (ArchiveSessionResponse);
  rpc Unarchive(UnarchiveSessionRequest) returns (UnarchiveSessionResponse);
  rpc Rename(RenameSessionRequest) returns (RenameSessionResponse);
  rpc Current(CurrentSessionRequest) returns (CurrentSessionResponse);
  rpc Compact(CompactSessionRequest) returns (CompactSessionResponse);
  rpc Repair(RepairSessionRequest) returns (RepairSessionResponse);
  rpc Status(GetSessionStatusRequest) returns (GetSessionStatusResponse);
  rpc Timeline(GetSessionTimelineRequest) returns (GetSessionTimelineResponse);
}

service ModelService {
  rpc RuntimeModel(RuntimeModelRequest) returns (RuntimeModelResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc SelectModel(SelectModelRequest) returns (SelectModelResponse);
  rpc SetProviderAPIKey(SetProviderAPIKeyRequest) returns (SetProviderAPIKeyResponse);
}

service GatewayService {
  rpc Status(GetGatewayStatusRequest) returns (GetGatewayStatusResponse);
  rpc Start(StartGatewayRequest) returns (StartGatewayResponse);
  rpc Stop(StopGatewayRequest) returns (StopGatewayResponse);
  rpc Restart(RestartGatewayRequest) returns (RestartGatewayResponse);
  rpc ListPairings(ListGatewayPairingsRequest) returns (ListGatewayPairingsResponse);
  rpc ApprovePairing(ApproveGatewayPairingRequest) returns (ApproveGatewayPairingResponse);
  rpc RevokePairing(RevokeGatewayPairingRequest) returns (RevokeGatewayPairingResponse);
  rpc ClearPendingPairings(ClearPendingGatewayPairingsRequest) returns (ClearPendingGatewayPairingsResponse);
}

service AutomationService {
  rpc Status(GetAutomationStatusRequest) returns (GetAutomationStatusResponse);
  rpc ListJobs(ListAutomationJobsRequest) returns (ListAutomationJobsResponse);
  rpc AddJob(AddAutomationJobRequest) returns (AddAutomationJobResponse);
  rpc UpdateJob(UpdateAutomationJobRequest) returns (UpdateAutomationJobResponse);
  rpc RemoveJob(RemoveAutomationJobRequest) returns (RemoveAutomationJobResponse);
  rpc RunJob(RunAutomationJobRequest) returns (RunAutomationJobResponse);
  rpc ListRuns(ListAutomationRunsRequest) returns (ListAutomationRunsResponse);
}

message RespondRequest {
  string message = 1;
  string instruct = 2;
  string id = 3;
  optional bool stream = 4;
}

message RespondEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TEXT_DELTA = 1;
    DONE = 2;
    ERROR = 3;
    TRACE_EVENT = 4;
  }

  enum Channel {
    CHANNEL_UNSPECIFIED = 0;
    ASSISTANT = 1;
    REASONING = 2;
  }

  Type type = 1;
  string text = 2;
  string error = 3;
  Channel channel = 4;
  string trace_type = 5;
  string trace_payload_json = 6;
  // Present for TRACE_EVENT, ERROR, and DONE. TEXT_DELTA consumers should use local receive time.
  google.protobuf.Timestamp timestamp = 7;
  string trace_session_id = 8;
}

message SessionSummary {
  string id = 1;
  int64 updated_at_unix = 2;
  int32 message_count = 3;
  string title = 4;
  string title_source = 5;
  string origin_source = 6;
}

message CreateSessionRequest {
  string id = 1;
  optional bool auto_switch = 2;
  string origin_source = 3;
}

message CreateSessionResponse {
  SessionSummary session = 1;
}

message ListSessionsRequest {
  optional bool archived = 1;
  string origin_source = 2;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message UseSessionRequest {
  string id = 1;
}

message UseSessionResponse {
  string id = 1;
}

message ArchiveSessionRequest {
  string id = 1;
}

message ArchiveSessionResponse {
  string id = 1;
}

message UnarchiveSessionRequest {
  string id = 1;
}

message UnarchiveSessionResponse {
  SessionSummary session = 1;
}

message RenameSessionRequest {
  string id = 1;
  string title = 2;
}

message RenameSessionResponse {
  SessionSummary session = 1;
}

message CurrentSessionRequest {}

message CurrentSessionResponse {
  string id = 1;
  string title = 2;
  string title_source = 3;
}

message CompactSessionRequest {
  string id = 1;
}

message CompactSessionResponse {
  string id = 1;
  int32 source_end_offset = 2;
  int32 source_message_count = 3;
  google.protobuf.Timestamp updated_at = 4;
  int32 current_context_length = 5;
  int32 total_context_length = 6;
}

message RepairSessionRequest {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    VECTOR = 1;
  }

  Type type = 1;
  VectorRepairOption vector = 2;
}

message RepairSessionResponse {
  RepairSessionRequest.Type type = 1;
  VectorRepairResponse vector = 2;
}

message VectorRepairOption {
  string id = 1;
  bool full = 2;
}

message VectorRepairResponse {
  int32 sessions_scanned = 1;
  int32 messages_scanned = 2;
  int32 rows_scanned = 3;
  int32 missing_rows = 4;
  int32 stale_rows = 5;
  int32 unchanged_rows = 6;
  int32 rebuilt_rows = 7;
  int32 deleted_sources = 8;
  int32 batches = 9;
}

message GetSessionStatusRequestContext {
  string id = 1;
}

message GetSessionStatusRequest {
  GetSessionStatusRequestContext context = 1;
}

message GetSessionStatusResponse {
  string id = 1;
  Context context = 2;
  int32 size = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  string compaction_status = 6;

  message Context {
    int32 offset = 1;
    int32 length = 2;
    int32 used = 3;
    int32 remaining = 4;
    double used_pct = 5;
    double remaining_pct = 6;
  }
}

message GetSessionTimelineRequest {
  string id = 1;
  int32 message_offset = 2;
  int32 message_limit = 3;
  int32 trace_offset = 4;
  int32 trace_limit = 5;
}

message SessionTimelineToolCall {
  string id = 1;
  string name = 2;
  string input = 3;
}

message SessionTimelineMessage {
  int32 offset = 1;
  uint64 id = 2;
  string role = 3;
  string name = 4;
  string tool_call_id = 5;
  string content = 6;
  google.protobuf.Timestamp created_at = 7;
  repeated SessionTimelineToolCall tool_calls = 8;
}

message SessionTimelineTraceEvent {
  uint64 id = 1;
  int32 sequence = 2;
  string type = 3;
  google.protobuf.Timestamp timestamp = 4;
  string payload_json = 5;
}

message GetSessionTimelineResponse {
  string id = 1;
  repeated SessionTimelineMessage messages = 2;
  repeated SessionTimelineTraceEvent trace_events = 3;
  bool messages_has_more = 4;
  bool traces_has_more = 5;
  bool traces_truncated_before = 6;
  int32 first_trace_sequence = 7;
  int32 last_trace_sequence = 8;
  string title = 9;
  string title_source = 10;
}

message RuntimeModelRequest {}

message RuntimeModelResponse {
  string provider = 1;
  string api = 2;
  string model = 3;
  string base_url = 4;
  int32 context_length = 5;
}

message ListProvidersRequest {}

message ProviderOption {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 model_count = 4;
  bool supports_api_key = 5;
  bool supports_oauth = 6;
  string auth_type = 7;
  bool current = 8;
}

message ListProvidersResponse {
  repeated ProviderOption providers = 1;
}

message ListModelsRequest {
  string provider = 1;
}

message ModelOption {
  string id = 1;
  string name = 2;
  string provider = 3;
  string api = 4;
  int32 context_window = 5;
  int32 max_tokens = 6;
  repeated string input = 7;
  bool reasoning = 8;
  bool supports_oauth = 9;
  bool current = 10;
}

message ListModelsResponse {
  string provider = 1;
  string auth_type = 2;
  repeated ModelOption models = 3;
}

message SelectModelRequest {
  string id = 1;
  string provider = 2;
}

message SelectModelResponse {
  ModelOption model = 1;
}

message SetProviderAPIKeyRequest {
  string provider = 1;
  string api_key = 2;
}

message SetProviderAPIKeyResponse {
  string provider = 1;
}

message GatewayStatus {
  string state = 1;
  string address = 2;
  int32 port = 3;
  string slack_mode = 4;
  string telegram_mode = 5;
  string last_error = 6;
}

message GetGatewayStatusRequest {}

message GetGatewayStatusResponse {
  GatewayStatus status = 1;
}

message StartGatewayRequest {}

message StartGatewayResponse {
  GatewayStatus status = 1;
}

message StopGatewayRequest {}

message StopGatewayResponse {
  GatewayStatus status = 1;
}

message RestartGatewayRequest {}

message RestartGatewayResponse {
  GatewayStatus status = 1;
}

message GatewayPairingRequest {
  string source = 1;
  string sender_id = 2;
  string display_name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message GatewayPairedSender {
  string source = 1;
  string sender_id = 2;
  string display_name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListGatewayPairingsRequest {
  string source = 1;
}

message ListGatewayPairingsResponse {
  repeated GatewayPairingRequest pending = 1;
  repeated GatewayPairedSender approved = 2;
}

message ApproveGatewayPairingRequest {
  string source = 1;
  string code = 2;
}

message ApproveGatewayPairingResponse {
  bool approved = 1;
  GatewayPairedSender sender = 2;
}

message RevokeGatewayPairingRequest {
  string source = 1;
  string sender_id = 2;
}

message RevokeGatewayPairingResponse {}

message ClearPendingGatewayPairingsRequest {
  string source = 1;
}

message ClearPendingGatewayPairingsResponse {}

message AutomationSchedule {
  string kind = 1;
  google.protobuf.Timestamp at = 2;
  int64 every_nanos = 3;
  string cron = 4;
  string timezone = 5;
}

message AutomationPayload {
  string kind = 1;
  string prompt = 2;
  string system_event = 3;
  string model = 4;
  string provider = 5;
  string base_url = 6;
  bool no_timeout = 7;
  int64 max_runtime_nanos = 8;
  int32 max_iterations = 9;
  int32 retry_attempts = 10;
  int64 retry_backoff_nanos = 11;
  int64 retry_max_delay_nanos = 12;
  repeated string tool_groups = 13;
  map<string, string> metadata = 14;
}

message AutomationDelivery {
  string mode = 1;
  string channel = 2;
  string target = 3;
  string thread_id = 4;
  string webhook_url = 5;
  bool best_effort = 6;
  string failure_target = 7;
  int32 failure_after = 8;
  int64 failure_cooldown_nanos = 9;
}

message AutomationJobState {
  google.protobuf.Timestamp next_run_at = 1;
  google.protobuf.Timestamp running_at = 2;
  google.protobuf.Timestamp last_run_at = 3;
  string last_status = 4;
  string last_error = 5;
  int64 last_duration_nanos = 6;
  int32 consecutive_errors = 7;
  google.protobuf.Timestamp last_failure_notice_at = 8;
}

message AutomationJob {
  string id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  AutomationSchedule schedule = 7;
  AutomationPayload payload = 8;
  AutomationDelivery delivery = 9;
  string profile = 10;
  string session_target = 11;
  bool delete_after_run = 12;
  AutomationJobState state = 13;
}

message AutomationUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
  int32 cache_read_tokens = 4;
  int32 cache_write_tokens = 5;
}

message AutomationRun {
  string id = 1;
  string job_id = 2;
  string status = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp ended_at = 5;
  int64 duration_nanos = 6;
  string output = 7;
  string error = 8;
  string session_id = 9;
  string delivery_status = 10;
  string delivery_error = 11;
  string model = 12;
  string provider = 13;
  AutomationUsage usage = 14;
}

message GetAutomationStatusRequest {}

message GetAutomationStatusResponse {
  bool running = 1;
  google.protobuf.Timestamp started_at = 2;
  int32 job_count = 3;
  int32 running_count = 4;
  google.protobuf.Timestamp next_wake_at = 5;
}

message ListAutomationJobsRequest {
  repeated string ids = 1;
  optional bool enabled = 2;
  string profile = 3;
  string session_target = 4;
  int32 limit = 5;
  bool include_disabled = 6;
}

message ListAutomationJobsResponse {
  repeated AutomationJob jobs = 1;
}

message AddAutomationJobRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  AutomationSchedule schedule = 7;
  AutomationPayload payload = 8;
  AutomationDelivery delivery = 9;
  string profile = 10;
  string session_target = 11;
  bool delete_after_run = 12;
  AutomationJobState state = 13;
}

message AddAutomationJobResponse {
  AutomationJob job = 1;
}

message UpdateAutomationJobRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional bool enabled = 4;
  AutomationSchedule schedule = 5;
  AutomationPayload payload = 6;
  AutomationDelivery delivery = 7;
  optional string profile = 8;
  optional string session_target = 9;
  optional bool delete_after_run = 10;
  AutomationJobState state = 11;
}

message UpdateAutomationJobResponse {
  AutomationJob job = 1;
}

message RemoveAutomationJobRequest {
  string id = 1;
}

message RemoveAutomationJobResponse {
  string id = 1;
}

message RunAutomationJobRequest {
  string id = 1;
}

message RunAutomationJobResponse {
  AutomationRun run = 1;
}

message ListAutomationRunsRequest {
  string job_id = 1;
  repeated string ids = 2;
  repeated string status = 3;
  int32 limit = 4;
}

message ListAutomationRunsResponse {
  repeated AutomationRun runs = 1;
}
